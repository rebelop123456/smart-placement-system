{% extends "base.html" %}

{% block content %}
<style>
    .form-container {
        max-width: 550px;
        margin: 50px auto;
        background: white;
        border-radius: 20px;
        padding: 35px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #0f1a2a;
    }
    .form-group .required {
        color: #ef4444;
    }
    .form-control {
        width: 100%;
        padding: 12px;
        border: 2px solid #e5e7eb;
        border-radius: 10px;
        font-size: 16px;
        transition: all 0.3s;
    }
    .form-control:focus {
        outline: none;
        border-color: #54acbf;
        box-shadow: 0 0 0 3px rgba(84,172,191,0.1);
    }
    .btn-primary {
        background: linear-gradient(135deg, #54acbf, #3f8ea0);
        color: white;
        padding: 12px 25px;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: all 0.3s;
    }
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(84,172,191,0.3);
    }
    .btn-secondary {
        background: #f3f4f6;
        color: #4a5b6e;
        padding: 12px 25px;
        border: none;
        border-radius: 10px;
        text-decoration: none;
        display: inline-block;
        text-align: center;
        width: 100%;
        margin-top: 10px;
    }
    .info-text {
        font-size: 0.875rem;
        color: #6c757d;
        margin-top: 5px;
    }
</style>

<div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 60px 0 40px;">
    <div class="container">
        <h1 style="color: white; font-size: 2.5rem; margin-bottom: 10px;">
            <i class="fas fa-user-plus"></i> Add New Admin
        </h1>
        <p style="color: rgba(255,255,255,0.9);">Create a new administrator account</p>
    </div>
</div>

<div class="container">
    <div class="form-container">
        <form method="POST">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Full Name <span class="required">*</span></label>
                <input type="text" name="full_name" class="form-control" required placeholder="Enter full name">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address <span class="required">*</span></label>
                <input type="email" name="email" class="form-control" required placeholder="admin@example.com">
                <div class="info-text">This will be used for login</div>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password <span class="required">*</span></label>
                <input type="password" name="password" class="form-control" required placeholder="Enter password (min 6 characters)">
                <div class="info-text">Password must be at least 6 characters</div>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Confirm Password <span class="required">*</span></label>
                <input type="password" name="confirm_password" class="form-control" required placeholder="Confirm password">
            </div>
            
            <button type="submit" class="btn-primary">
                <i class="fas fa-user-plus"></i> Create Admin Account
            </button>
            <a href="/admin/dashboard" class="btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </form>
    </div>
</div>
{% endblock %}
