{% extends "base.html" %}

{% block content %}
<style>
    .register-container {
        min-height: calc(100vh - 300px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        position: relative;
        overflow: hidden;
    }
    
    .register-container::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -20%;
        width: 500px;
        height: 500px;
        background: rgba(255,255,255,0.1);
        border-radius: 50%;
        animation: float 8s ease-in-out infinite;
    }
    
    .register-container::after {
        content: '';
        position: absolute;
        bottom: -30%;
        left: -10%;
        width: 400px;
        height: 400px;
        background: rgba(255,255,255,0.1);
        border-radius: 50%;
        animation: float 6s ease-in-out infinite reverse;
    }
    
    @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-30px) rotate(5deg); }
    }
    
    .register-card {
        position: relative;
        z-index: 2;
        max-width: 550px;
        width: 100%;
        background: white;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        animation: slideUp 0.5s ease;
    }
    
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .register-header {
        background: linear-gradient(135deg, #54acbf, #3f8ea0);
        padding: 30px;
        text-align: center;
        position: relative;
    }
    
    .register-header .icon {
        width: 70px;
        height: 70px;
        background: rgba(255,255,255,0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 15px;
        font-size: 2rem;
        color: white;
        backdrop-filter: blur(10px);
    }
    
    .register-header h2 {
        color: white;
        font-size: 1.8rem;
        margin-bottom: 5px;
    }
    
    .register-header p {
        color: rgba(255,255,255,0.9);
        font-size: 0.9rem;
    }
    
    .register-body {
        padding: 35px;
    }
    
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
    }
    
    .input-group {
        margin-bottom: 20px;
        position: relative;
    }
    
    .input-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #1e293b;
        font-size: 0.85rem;
    }
    
    .input-group .input-icon {
        position: absolute;
        left: 15px;
        bottom: 12px;
        color: #94a3b8;
        font-size: 0.9rem;
    }
    
    .input-group input, .input-group select {
        width: 100%;
        padding: 12px 15px 12px 45px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 0.95rem;
        transition: all 0.3s;
        background: #f8fafc;
    }
    
    .input-group input:focus, .input-group select:focus {
        outline: none;
        border-color: #54acbf;
        background: white;
        box-shadow: 0 0 0 3px rgba(84, 172, 191, 0.1);
    }
    
    .register-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #54acbf, #3f8ea0);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
    }
    
    .register-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(84, 172, 191, 0.3);
    }
    
    .login-link {
        text-align: center;
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid #e2e8f0;
    }
    
    .login-link a {
        color: #54acbf;
        text-decoration: none;
        font-weight: 500;
    }
    
    .login-link a:hover {
        text-decoration: underline;
    }
    
    .role-badge {
        display: inline-block;
        background: rgba(255,255,255,0.2);
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 0.75rem;
        color: white;
        margin-top: 10px;
    }
    
    @media (max-width: 600px) {
        .form-row {
            grid-template-columns: 1fr;
            gap: 0;
        }
        .register-body {
            padding: 25px;
        }
    }
</style>

<div class="register-container">
    <div class="register-card">
        <div class="register-header">
            <div class="icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h2>Create Account</h2>
            <p>Join Smart Placement System</p>
            <div class="role-badge">
                <i class="fas fa-graduation-cap"></i> Student Registration
            </div>
        </div>
        
        <div class="register-body">
            <form method="POST">
                <div class="form-row">
                    <div class="input-group">
                        <label><i class="fas fa-user"></i> Full Name *</label>
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" name="full_name" required placeholder="Enter your full name">
                    </div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-id-card"></i> Roll Number *</label>
                        <i class="fas fa-id-card input-icon"></i>
                        <input type="text" name="roll_number" required placeholder="Enter roll number">
                    </div>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email Address *</label>
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" name="email" required placeholder="Enter your email">
                </div>
                
                <div class="form-row">
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Password *</label>
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" name="password" required placeholder="Create a password (min 6 characters)">
                    </div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Confirm Password *</label>
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" name="confirm_password" required placeholder="Confirm your password">
                    </div>
                </div>
                
                <input type="hidden" name="role" value="student">
                
                <button type="submit" class="register-btn">
                    <i class="fas fa-user-plus"></i> Register Now
                </button>
            </form>
            
            <div class="login-link">
                <p>Already have an account? 
                    <a href="/login?role=student">
                        Login here <i class="fas fa-arrow-right"></i>
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
